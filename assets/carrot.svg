<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Golden carrot">
  <defs>
    <linearGradient id="gagCarrotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe79a" />
      <stop offset="0.45" stop-color="#ffc83d" />
      <stop offset="1" stop-color="#f59a1f" />
    </linearGradient>
    <linearGradient id="gagCarrotLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fe85f" />
      <stop offset="1" stop-color="#3f9e2a" />
    </linearGradient>
  </defs>

  <!-- leaves -->
  <g fill="url(#gagCarrotLeaf)" stroke="#2f7d20" stroke-width="1.6" stroke-linejoin="round">
    <path d="M30 21C23.5 17.5 19.5 13 17.5 7.5 24.8 7.5 30.8 11.5 32 19.5Z" />
    <path d="M34 21C40.5 17.5 44.5 13 46.5 7.5 39.2 7.5 33.2 11.5 32 19.5Z" />
    <path d="M32 20.5C30.7 12 32.8 4.5 33 4.2 36.2 8.2 36.2 14.5 33 20.5Z" />
  </g>

  <!-- body -->
  <path
    fill="url(#gagCarrotBody)"
    stroke="#d9870f"
    stroke-width="2.4"
    stroke-linejoin="round"
    d="M19 21.5C19 16.8 45 16.8 45 21.5 45 31.5 37.5 55 32 59.5 26.5 55 19 31.5 19 21.5Z"
  />

  <!-- ridges / shine -->
  <g stroke="#fff" stroke-opacity="0.55" stroke-width="2.4" stroke-linecap="round">
    <path d="M26.5 26.5 28 33.5" />
    <path d="M34.5 25.5 33.5 35" />
    <path d="M30.5 41 31.5 47" />
  </g>
</svg>
